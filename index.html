<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="festali10.jpg">
  <meta name="description" content="FESTALI — Conecta tus mejores momentos con invitaciones digitales únicas">
  <meta name="theme-color" content="#4b4495">
  <title>FESTALI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Orbes decorativos */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(231,34,104,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(75,68,149,0.35) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .home-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 40px 24px;
    }

    .home-logo {
      width: 220px;
      max-width: 70vw;
      margin-bottom: 32px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.35));
    }

    .home-slogan {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: clamp(1.3rem, 4vw, 2rem);
      color: #4b4495;
      letter-spacing: 0.02em;
      margin-bottom: 48px;
      opacity: 0.92;
      text-shadow: none;
    }

    .btn-home {
      display: inline-block;
      background: linear-gradient(135deg, #e72268 0%, #c01755 100%);
      color: #fff;
      font-family: 'Montserrat', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 16px 48px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 28px rgba(231,34,104,0.45);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .btn-home:hover {
      background: linear-gradient(135deg, #ff3d82 0%, #e72268 100%);
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(231,34,104,0.55);
    }

    .btn-home:active {
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .home-logo { width: 170px; margin-bottom: 24px; }
      .home-slogan { margin-bottom: 36px; }
      .btn-home { padding: 14px 36px; font-size: 0.95rem; }
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(231,34,104,0.1);
    }
    .nav-links { display: flex; gap: 36px; align-items: center; }
    .nav-link {
      color: #e72268;
      text-decoration: none;
      font-family: 'Montserrat', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s, opacity 0.2s;
    }
    .nav-link:hover { color: #c01755; opacity: 0.85; }
    .lang-switch { display:flex; align-items:center; gap:5px; }
    .lang-flag { font-size:1.2rem; opacity:0.28; transition:opacity .2s,transform .15s; cursor:pointer !important; pointer-events:auto !important; user-select:none; line-height:1; background:none; border:none; padding:0; display:inline-block; }
    .lang-flag.active-flag { opacity:1; }
    .lang-flag:hover { opacity:0.75; transform:scale(1.18); }
    .lang-flag.active-flag:hover { opacity:1; transform:scale(1.08); }
    .lang-div { width:1px; height:13px; background:rgba(75,68,149,0.22); flex-shrink:0; }

    /* FAB stack */
    .fab-stack {
      position: fixed;
      right: 16px;
      bottom: 28px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .fab {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      font-size: 1.1rem;
      box-shadow: 0 3px 14px rgba(0,0,0,0.28);
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0.78;
    }
    .fab:hover { transform: scale(1.13); opacity: 1; }
    .fab-top { background: rgba(75,68,149,0.92); color: #fff; font-weight: 700; font-size: 1.25rem; }
    .fab-wsp { background: #25d366; color: #fff; }
    .fab-email { background: #4b4495; color: #fff; font-size: 0.95rem; }
  </style>
</head>
<body id="top">

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar">
    <div class="nav-links">
      <a href="index.html" class="nav-link" id="navInicio">Inicio</a>
      <a href="paquetes.html" class="nav-link" id="navInvitaciones">Invitaciones</a>
      <div class="lang-switch">
        <span class="lang-flag" id="flagES" onclick="setLangIndex('es')" title="Español">🇲🇽</span>
        <div class="lang-div"></div>
        <span class="lang-flag" id="flagEN" onclick="setLangIndex('en')" title="English">🇺🇸</span>
      </div>
    </div>
  </nav>

  <div class="home-container">
    <img src="logotipo.png" alt="FESTALI" class="home-logo">
    <p class="home-slogan">Conecta tus mejores momentos</p>
    <a href="paquetes.html" class="btn-home">Invitaciones Digitales</a>
  </div>

  <!-- Botones flotantes -->
  <div class="fab-stack">
    <a href="#top" class="fab fab-top" title="Volver arriba">↑</a>
    <a href="https://wa.me/526862301280" target="_blank" rel="noopener noreferrer" class="fab fab-wsp" title="WhatsApp"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>
    <a href="mailto:festaliconecta@gmail.com" class="fab fab-email" title="Email">✉</a>
  </div>

  <script>
    var IDX_T = {
      es: { navInicio:'Inicio', navInv:'Invitaciones', slogan:'Conecta tus mejores momentos', btn:'Invitaciones Digitales' },
      en: { navInicio:'Home',   navInv:'Invitations',  slogan:'Connect your best moments',    btn:'Digital Invitations'   }
    };
    function getIndexLang() {
      var s = localStorage.getItem('festali_lang');
      if (s === 'en' || s === 'es') return s;
      return navigator.language.startsWith('en') ? 'en' : 'es';
    }
    function applyIndexLang() {
      var lang = getIndexLang();
      var T = IDX_T[lang];
      var ni = document.getElementById('navInicio');
      var nv = document.getElementById('navInvitaciones');
      var sl = document.querySelector('.home-slogan');
      var bt = document.querySelector('.btn-home');
      var fES = document.getElementById('flagES');
      var fEN = document.getElementById('flagEN');
      if (ni) ni.textContent = T.navInicio;
      if (nv) nv.textContent = T.navInv;
      if (sl) sl.textContent = T.slogan;
      if (bt) bt.textContent = T.btn;
      if (fES) fES.classList.toggle('active-flag', lang === 'es');
      if (fEN) fEN.classList.toggle('active-flag', lang === 'en');
    }
    function setLangIndex(lang) {
      localStorage.setItem('festali_lang', lang);
      applyIndexLang();
    }
    document.addEventListener('DOMContentLoaded', applyIndexLang);
  </script>
</body>
</html>
