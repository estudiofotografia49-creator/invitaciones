<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FESTALI — Conecta tus mejores momentos con invitaciones digitales únicas">
  <meta name="theme-color" content="#4b4495">
  <title>FESTALI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1a1040 0%, #2d1b69 45%, #4b4495 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Orbes decorativos */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(231,34,104,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -100px;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(75,68,149,0.35) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .home-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 40px 24px;
    }

    .home-logo {
      width: 220px;
      max-width: 70vw;
      margin-bottom: 32px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.35));
    }

    .home-slogan {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.3rem, 4vw, 2rem);
      color: #fff;
      letter-spacing: 0.02em;
      margin-bottom: 48px;
      opacity: 0.92;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .btn-home {
      display: inline-block;
      background: linear-gradient(135deg, #e72268 0%, #c01755 100%);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 16px 48px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 28px rgba(231,34,104,0.45);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .btn-home:hover {
      background: linear-gradient(135deg, #ff3d82 0%, #e72268 100%);
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(231,34,104,0.55);
    }

    .btn-home:active {
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .home-logo { width: 170px; margin-bottom: 24px; }
      .home-slogan { margin-bottom: 36px; }
      .btn-home { padding: 14px 36px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <div class="home-container">
    <img src="logotipo.png" alt="FESTALI" class="home-logo">
    <p class="home-slogan">Conecta tus mejores momentos</p>
    <a href="paquetes.html" class="btn-home">Invitaciones Digitales</a>
  </div>

</body>
</html>
